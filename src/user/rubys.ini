script_initCheckout="
<script>
var g = window.i13n;
var query = g.query;
var getOptionText = g.getOptionText;
var delegate = g.delegate;
var getUrl = g.getUrl;
var getNum = g.getNum;
var dShip = query.one('#id_tr_freight');
var dPay = query.one('#id_tr_pay_type');
var isMobile = g.isMobile;

var getProdId = function(el) {
  var id = null;
  var dLink = el.querySelector('a[href*="product_sn"]');
  if (dLink) {
    id = getUrl('product_sn', dLink.href);
  }
  return id;
};

var getMobileProdItem = function (el) {
  var dName = el.querySelector('.cart_product_item_name');
  var dName2 = dName.cloneNode(true);
  var dSpec = dName2.querySelector('.cart_product_item_standard_content');
  dName2.removeChild(dSpec);
  var name = dName2.innerText;
  var variant = dSpec.innerText;  
  var promote = getItemPromote(el); 
  var price = 0;
  var dPrice = el.querySelector('.cart_product_item_sale_price');
  if (dPrice) {
    price = getNum(dPrice.innerText);
  }
  var id = getProdId(el);
  var quantity = 1;
  var dQtySel = el.querySelector("select[name*=order_amount]");
  if (dQtySel) {
     quantity = dQtySel.value;
  }
  return {
    name: name,
    variant: variant,
    coupon: promote,
    price: price,
    id: id,
    quantity: quantity
  };
};

var getMobileProducts = function () {
  var allTitle;
  var dAllTitle = query.one('#id_shopping_car_list');
  if (dAllTitle) {
    allTitle = dAllTitle.querySelectorAll('.title');
  }
  if (!dAllTitle || !allTitle.length) {
    dAllTitle = query.one('#id_shopping_car_list_preview');
    if (dAllTitle) {
      allTitle = dAllTitle.querySelectorAll('.title');
    }
  }
  var products = [];
  var label='結帳商品';
  for (var i=0, len=allTitle.length; i < len; i++) {
    var t = allTitle[i];
    if (-1 !== t.innerText.indexOf(label)) {
      var arrProducts = query.ancestor(t, 'div.block_outside_box').querySelectorAll('table');
      for (var j=0, jLen=arrProducts.length; j < jLen; j++) {
        products.push(getMobileProdItem(arrProducts[j]));
      };
      break;
    }
  }
  return products;
};

var getItemPromote = function(el) {
  var dPromote = el.querySelector('.cart_product_item_best');
  if (!dPromote) {
    dPromote = el.querySelector('.cart_product_item_discount_context'); 
  }
  return dPromote.innerText;
};

var getPcProdItem = function(tr){
  var name = tr.querySelector(".cart_product_item_product_name").innerText;
  var variant = tr.querySelector(".cart_product_item_standard_content").innerText;
  var promote = getItemPromote(tr); 
  var price = tr.querySelector(".cart_product_item_now_price").innerText;
  var qtySel = tr.querySelector("select");
  var quantity;
  if (qtySel) {
    quantity = qtySel.value;
  } else {
    quantity = getNum(tr.querySelector('td:nth-child(4)').innerText);
  }
  var id = getProdId(tr);
  return {
    name: name,
    variant: variant,
    coupon: promote,
    price: getNum(price),
    id: id,
    quantity: quantity
  };
};

var getPcProducts = function(){
  var names = query.all('.shopping_order_product_table .cart_product_item_product_name');
  var products = names.map(function(el){
    return getPcProdItem(query.ancestor(el, 'tr'));
  });
  return products;
};

var getProducts = function(){
  g.lastProducts = (isMobile()) ? getMobileProducts() : getPcProducts();
  return g.lastProducts; 
};

var selShip = function(e){
  var target = e.target;
  if ('IMG' === target.nodeName.toUpperCase()) {
    var dType = dShip.querySelector('input:checked');
    var label = query.ancestor(dType, 'label');
    var type = label.innerText;
    var ship = [type, target.title].join(','); 
    var products = getProducts();
    g.dispatch('action', {
      I13N: {
        action: 'CheckoutOption',
        stepNo: 3,
        stepOption: ship,
        products: products,
      }
    });
  }
};

var selPay = function(e){
  var target = e.target;
  if ('IMG' === target.nodeName.toUpperCase()) {
    var pay = target.title;
    var products = getProducts();
    g.dispatch('action', {
      I13N: {
        action: 'CheckoutOption',
        stepNo: 4,
        stepOption: pay,
        products: products,
      }
    });
  }
};

var getMobilePurchase = function () {
  var allTitle = query.one('#id_shopping_car_list').querySelectorAll('.title');
  var shipping = 0;
  for (var i=0, j=allTitle.length; i < j; i++) {
    var t = allTitle[i];
    if (-1 !== t.innerText.indexOf('貨運')) {
      var pShip = query.ancestor(t, 'div.block_outside_box');
      shipping = getNum(pShip.querySelector('.title_discount_number').innerText);
      break;
    }
  }
  return {
    shipping: shipping,
    products: getMobileProducts(),
  };
};

var getPcPurchase = function (e) {
  var shipping = getNum(query.one('.shopping_order_product_table .title_fee_number').innerText);
  var products = getPcProducts();
  return {
    products: products,
    shipping: shipping,
  };
};

var doPurchase = function(e) {
  var prod;
  if (isMobile()) {
    prod = getMobilePurchase();
  } else {
    prod = getPcPurchase();
  }
  var revenue = query.one('input[name="order_payment_price"]').value; 
  var dCoupon = query.one('input[name="serial_coupon_number"]');
  var coupon;
  if (dCoupon) {
    coupon = dCoupon.value;
  }
  var city;
  var dCitySel = query.one('select[name=member_country_level_2]');
  if (dCitySel) {
    city = getOptionText(dCitySel);
  }
  g.dispatch('action', {
    wait: 2,
    stop: true,
    lazyKey: 'Purchase',
    I13N: {
      purchaseId: (new Date()).getTime(),
      action: 'Purchase',
      city: city,
      coupon: coupon,
      revenue: revenue,
      products: prod.products,
      shipping: prod.shipping,
    }
  });
};

var doRemoveFromCart = function(e) {
  var t = e.currentTarget;
  var p;
  var prod;
  if (isMobile()) {
    p = query.ancestor(t, 'table');
    prod = getMobileProdItem(p);
  } else {
    p = query.ancestor(t, 'tr');
    prod = getPcProdItem(p);
  }
  g.dispatch('action', {
    I13N: {
      action: 'RemoveFromCart',
      products: [prod] 
    }
  });
};

var register = function() {
  /* Because checkout is a lazy load page */
  if (dShip) {
    dShip.addEventListener('click', selShip);
  }
  if (dPay) {
    dPay.addEventListener('click', selPay);
  }
  delegate(document, 'click', 'a[href*="delete_list_product"]', doRemoveFromCart);
  var dBtn = query.one('[onclick*="to_check_order"]');
  if (dBtn) {
    dBtn.addEventListener('click', doPurchase);
  }
};

setTimeout(function(){
  register();
  var products = getProducts();
  g.dispatch('action', {
    I13N: {
      action: 'Checkout',
      stepNo: 2,
      products: products
    }
  });
}, 1000);
</script>
"

script_addMemberOther="
<script>
var g = window.i13n;
var q = g.query;
g.dispatch('action', {
  I13N: {
    action: 'CompleteRegistration',
  },
  i13nCb: function(e, I13N, params) {
    var birthdayYear, regType;
    switch (params[0]) {
      case 'other':
        birthdayYear = q.one('select[name=birthday_y]').value;
        regType = q.one('#id_layer_msg_info div:first-child').innerText;
        break;
      case 'mobile':
        var dBirth = q.one('#id_td_register_pwd_info span');
        if (dBirth) {
          birthdayYear = dBirth.innerText.trim().substr(0,4);
        }
        regType = 'mobile';
        break;
    }
    I13N.label = {
      birthdayYear: birthdayYear,
      regType: regType,
    };
    return I13N;
  }
});
</script>
"

