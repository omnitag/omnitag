script_addToCart="
<script>
  var g = window.i13n;
  var isMobile = g.isMobile;
  var query = g.query;
  var qtySel = query.one('select[name*=standard_order_amount]');
  var getVariant = function(){
    var radios = query.all('.table_standard_attribute input');
    var variant;
    if (radios && radios.length) {
      radios.some(function(radio){
        if (radio.checked) {
          var p = query.ancestor(radio, 'td');
          variant = p.getAttribute('title');
          return true;
        } else {
          return false;
        }
      });
    } else {
      var dom;
      if (isMobile()) {
        dom = query.one('.product_detail_standard_context').cloneNode(true);
        var childs = dom.querySelectorAll('input ~ div'); 
        for (var i=0, len = childs.length; i < len; i++) {
          dom.removeChild(childs[i]);
        }
      } else {
        dom = query.one('.standard_type_context');
      }
      if (dom) {
        variant = dom.innerText.trim();
      }
    }
    return variant;
  };
  g.dispatch('action', { 
    I13N: {
      action: 'AddToCart',
    },
    i13nCb: function(e, I13N, p, state) {
      const pInfo = state.get('detailInfo').toJS();
      pInfo.quantity = qtySel.value;
      pInfo.variant = getVariant();
      I13N.products = [pInfo];
      I13N.label = pInfo;
      return I13N;
    }
  });
</script>
"


