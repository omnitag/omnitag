script_getAllFilter="
<script>
var g = window.i13n;
var query = g.query;

var getAllFilter = function() {
  var arrLi = query.all('.div_small_side_menu_list li');
  var arrSec = query.all('.div_small_side_menu_list .menu_level_3_outside');
  var arrSel = [];
  arrLi.forEach(function(li, liKey){
    var title = li.innerText;
    var inputs = Array.from(arrSec[liKey].querySelectorAll("input"));
    inputs.forEach(function(input){
      if (input.checked) {
        var dLabel = query.ancestor(input, 'label').innerText;
        arrSel.push([title, dLabel]);
      } else if ('text' === input.type) {
        arrSel.push([title, input.value, input.getAttribute('placeholder')]);
      }
    })
  });
  return arrSel;
};
g.dispatch({getAllFilter: getAllFilter});
</script>
"

script_changeFilter="
<script>
var g = window.i13n;
var query = g.query;
g.dispatch('action', { 
  wait: 0,
  I13N: {
    action: 'Filter'
  },
  i13nCb: function(e, I13N, p, state) {
    if ('click' === e.type) {
      var newPrice = state.get('getMinMax')();
      var price = state.get('filterPrice');
      if (newPrice[0] === price[0] && newPrice[1] === price[1]) {
        return false;
      }
    }
    var getAllFilter = state.get('getAllFilter');
    I13N.label = getAllFilter();
    return I13N;
  }
})
</script>
