script_clickMenu="
<script>
var g = window.i13n;
var query = g.query;
g.dispatch('action', { 
  stop: true,
  I13N: {
    action: 'ClickMenu'
  },
  i13nCb: function(e, I13N) {
    var t = e.target;
    var pDiv = query.ancestor(t, '[id*="id_store_top_menu_"]');
    var pId = pDiv.id.split('_').slice(-1)[0];
    var layers = [];
    var t1 = query.one('#id_store_top_image_'+pId);
    if (t1) {
      layers.push(t1.innerText);
    }
    var secondLayer = query.ancestor(t, '[class*="store_top_menu_2"]');
    var t2;
    if (secondLayer) {
      var secP = query.ancestor(secondLayer, 'ul');
      t2 = secP.querySelector('[class*="store_top_menu_1"]').innerText;
    }
    if (t2) {
      layers.push(t2);
    }
    layers.push(t.innerText);
    I13N.label = {layers: layers};
    return I13N;
  }
});
</script>
"

script_initCategory="
<script>
var g = window.i13n;
var query = g.query;
var getUrl = g.getUrl;
var getPrice = g.getNum;
var get = g.get;
var getMinMax = function() {
  var min = query.one('input[name*=attribute_min_price]');
  var max = query.one('input[name*=attribute_max_price]');
  var minV = (min) ? min.value : null;
  var maxV = (max) ? max.value : null;
  return [min, max];
};
var getProductId = function(a) {
  var href = a.href;
  return {
    id: getUrl('product_sn', href),
    variant: getUrl('color_sn', href),
  };
};
var products = query.all('.product_item');
if (!products.length) {
  products = query.all('.product_list_dynamic_item');
}
var arrP = {};
var category = '';
var jsonld = query.one('script[type="application/ld+json"]');
if (jsonld) {
  var jsonldArr = JSON.parse(jsonld.innerText);
  var cateItems = get(jsonldArr, ['itemListElement']); 
  var categorys = cateItems.map(function(item){
    return get(item, ['item', 'name']);
  });
  category = categorys.join('/');
}
products.forEach(function(product, key){
  var name = product.querySelector('.product_name').innerText;
  var idData = getProductId(product.querySelector('a'));
  var id = idData.id;
  var variant = idData.variant;
  var price = getPrice(product.querySelector('.product_price').innerText);
  arrP[id+'-'+variant] = {
    name: name,
    id: id,
    variant: variant,
    price: price,
    category: category,
    list: 'Category',
    position: key,
  };
});

g.dispatch('config/set', {
  filterPrice: getMinMax(),
  getMinMax: getMinMax,
  getProductId: getProductId,
  arrP: arrP,
  i13nPage: {
    impressions: Object.keys(arrP).map(function(key){return arrP[key];}),
  }
});
</script>
"

