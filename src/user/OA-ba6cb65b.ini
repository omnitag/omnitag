script_purchase="
<script>
var g = window.i13n;
var getRandomId = g.getRandomId;
var query = g.query;
var getNum = g.getNum;
g.dispatch('action', {
  withLazy: 'Purchase',
  I13N: {
    action: 'Purchase'
  },
  i13nCb: function(e, I13N, p, state) {
    products = I13N.products
    if (products) {
      var getShoplineOrderId = function() {
        var text = g.text;
        var dom = query.one('.confirm-message');
        if (dom) {
          var domText = text(dom);
          var numReg = /(\-)?(\d+)(\.)?(\d+)?/g;
          var matchId = domText.replace(',', '').match(numReg)[0];
          if (matchId) {
            return matchId
          } else {
            return getRandomId()
        }
      }
    };
    I13N.purchaseId = getShoplineOrderId();
    return I13N;
    } else {
      return false
    }
    
  },
});
</script>
"

