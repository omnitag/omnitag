  var dom = query.one('section.delivery-form .pull-right');
  if (dom) {
    return getNum(dom);
  }
};
var getTax = function() {
  var dom = query.one('section.payment-form .pull-right');
  if (dom) {
    return getNum(dom);
  }
};

