    var variation = pDom.querySelector('.variation-label--selected');
    var variant = text(variation);
    var quantity = getElValue('input[type="text"]', pDom);
    var pId = pInfo.id;
    I13N.products = [{
        id: pId,
        variant: variant,
        quantity: quantity
    }];
    return I13N;
  },
});
</script>
"

