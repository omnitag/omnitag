script_checkoutLib="
<script>
  var g = window.i13n;
  var query = g.query;
  var text = g.text;
  var getNum = g.getNum;
  var getElValue = g.getElValue;
  var fbqInfo = query.all("script").find((item) => {
    var json = JSON.stringify(item.outerHTML);
    return json.includes("InitiateCheckout");
  });
  var productIdsList = [];
  var productNameList = [];
  var productBrandList = [];

  if (fbqInfo) {
    var fbqInfo = fbqInfo.innerHTML;
    var productIdStrSplit = fbqInfo
      .match(/content_ids:"[0-9,]*"/)[0]
      .split('"');
    var productNameStrSplit = fbqInfo
      .match(/content_name:"[\s\S,]*",content_category/)[0]
      .split('"');
    var productBrdStrSplit = fbqInfo
      .match(/product_brand:"[\s\S,]*",currency/)[0]
      .split('"');
    if (productIdStrSplit.length > 1) {
      productIdsList = productIdStrSplit[1].split(",");
      productNameList = productNameStrSplit[1].split(",");
      productBrandList = productBrdStrSplit[1].split(",");
    }
  }

  g.getCheckoutProducts = function () {
    var isInCart = location.pathname.includes("cart");
    var products = [];
    var pRows;
    if (isInCart) {
      pRows = query.all("div.cart-rows__box .cart-column.cart-column__product");
    } else {
      pRows = query.all(
        ".bp3-collapse-body div.collapse-row.order-detail__row"
      );
    }

    if (pRows && pRows.length) {
      pRows.forEach(function (row, index) {
        var quantity;
        var price;
        if (isInCart) {
          quantity = getNum(getElValue(".bp3-input-group input", row));
          price = getNum(row.querySelector("div.column-price"));
        } else {
          quantity = getNum(row.querySelector(".order-detail__amount"));
          price = getNum(row.querySelector("div.order-detail__price"));
        }
        if (quantity == null) {
          quantity = getNum(row.querySelector("input"));
        }

        products.push({
          name: productNameList[index],
          id: productIdsList[index],
          brand: productBrandList[index],
          price: price,
          quantity: quantity,
        });
      });
    }
    return products;
  };
</script>
"

script_initCheckout="
<script>
  var g = window.i13n;
  var products = g.getCheckoutProducts() || [];
  var get = g.get;
  var query = g.query;
  var delegate = g.delegate;

  if (products) {
    g.dispatch({
      i13nPage: {
        stepNo: 3,
        products: products,
      },
    });
  }

  var rows = Array.from(query.one(".cart-rows__box").children);
  var checkoutCart = query.one(".cart-rows__box");
  if (checkoutCart) {
    delegate(
      checkoutCart,
      "mouseover",
      ".column-action .bp3-button.bp3-minimal",
      function (e) {
        var t = e.currentTarget || e.target;
        var cartItem = query.ancestor(t, ".cart-column__product");
        var indexOfItem = rows.indexOf(cartItem);
        if (products) {
          g.lastCartProdId = get(products[indexOfItem], ["id"]);
        }
      }
    );
  }
</script>
" 

script_clickConfirmCheckout="
<script>
  var g = window.i13n;
  var get = g.get;
  var query = g.query;
  var merge = g.merge;
  var getNum = g.getNum;
  var getElValue = g.getElValue;

  var promotion;
  var shipping;
  var pricesInfo = query.one(".cart-checkout__prices");
  if (pricesInfo) {
    pricesInfo = pricesInfo.innerText;
    promotion = getNum(pricesInfo.match(/活動減免\s\-\$[\d]+/));
    shipping = getNum(pricesInfo.match(/本島運費\s\$[\d]+/));
  }
  var revenue = getNum(query.one(".price-subtotal .price-amount"));
  var bonus = getNum(query.one(".price-bonus .price-amount"));

  g.dispatch("action", {
    wait: 99,
    stop: true,
    lazyKey: "Purchase",
    I13N: {
      stepNo: 4,
      action: "ClickConfirmCheckout",
    },
    i13nCb: function (e, I13N, p, state) {
      I13N = merge(I13N, {
        products: g.getCheckoutProducts(),
        revenue: revenue,
        shipping: shipping,
        bonus: bonus,
        promotion: promotion,
      });
      return I13N;
    },
  });
</script>
" 

