script_initCategory="
<script>
  var g = window.i13n;
  var query = g.query;
  var text = g.text;
  var getNum = g.getNum;
  var objectToArray = g.objectToArray;
  var parseJson = g.parseJson;
  var getProducts = function () {
    var arr = {};
    var products = query.all(".banner-product-card");
    var categorys = query.all(".bp3-breadcrumbs .pet-breadcrumb__item");
    var category = text(
      categorys && categorys.length && categorys.slice(-1)[0]
    );
    products.forEach(function (product, key) {
      var pName = text(product.querySelector(".banner-product-card__title"));
      var pPrice = getNum(product.querySelector(".banner-product-card__price"));
      var pId = product
        .querySelector("a.banner-product-card__image-container")
        .getAttribute("href")
        .match(/product\/\d+/)[0]
        .slice(8);
      arr[pId] = {
        name: pName,
        id: pId,
        category: category,
        position: key,
        price: pPrice,
      };
    });
    return arr;
  };
  var arrP = getProducts();
  g.dispatch({
    i13nPage: {
      impressions: objectToArray(arrP),
    },
  });
</script>
