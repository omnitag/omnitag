script_officialMemberSignUp="
<script>
  var g = window.i13n;
  var get = g.get;
  var query = g.query;
  var getNum = g.getNum;
  var getElValue = g.getElValue;
  g.dispatch("action", {
    wait: 0,
    lazyKey: "CompleteRegistration",
    I13N: {
      action: "CompleteRegistration",
    },
    i13nCb: function (e, I13N) {
      var t = e.currentTarget;
      var signUpForm = query.ancestor(t, "form.sign-up-form");
      var contact = getElValue("#mobileOrEmailInput", signUpForm);
      if (!contact) {
        return false;
      }
      var isEmail = contact.includes("@");
      if (isEmail) {
        I13N.label = { email: contact };
      } else {
        I13N.label = { mobile: contact };
      }
      return I13N;
    },
  });
</script>
