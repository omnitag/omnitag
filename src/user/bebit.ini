; Bebit

; Tags
tag_usergram_enabled=true
tag_usergram_id="UgVTMw-1"
tag_usergram_test=true

; Router
router_rules[]="/*"
router_pages[]='all'


; Page
page_all_scripts[]=initUserId
page_all_params[]=[]
page_all_secs[]='clickTest'
page_all_secs[]='clickLine'

; Section
sec_clickTest_selects[]="#test"
sec_clickTest_types[]="click"
sec_clickTest_scripts[]="clickButton"
sec_clickTest_params[]=[]

sec_clickLine_selects[]="#line"
sec_clickLine_types[]="click"
sec_clickLine_scripts[]="clickLine"
sec_clickLine_params[]=[]

; Script
script_clickLine="
<script>
var g = window.i13n;
g.dispatch('action', {
  I13N: {
    action: 'carouselNavClick'
  }
});
</script>
"

script_clickButton="
<script>
var g = window.i13n;
g.dispatch('action', {
  I13N: {
    action: 'clickPageNav'
  }
});
</script>
"

script_initUserId="
<script>
var g = window.i13n;
var get = g.get;
var u = get(window, ['serviceId']);
if (u) {
  g.dispatch({ uid: u });
}
</script>
"
