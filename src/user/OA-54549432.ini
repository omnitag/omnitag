script_getDataLayer="
<script>
var g = window.i13n;
var get = g.get;

var mapProducts = function ({
  Prod_No,
  Name,
  Brand,
  Category,
  Variant,
  Quantity,
  Price,
}) {
  return {
    name: Name,
    id: Prod_No,
    price: Price,
    brand: Brand,
    category: Category,
    variant: Variant,
    quantity: Quantity,
  };
};

var proccessI13nBeacon = (model, message) => {
  var action = get(message, ["Action"]);
  var uid = get(message, ["Uid"]);
  if (uid) {
    g.dispatch({ uid });
  }
  if (action) {
    var products = get(message, ["Item"], []).map(mapProducts);
    switch (action) {
      case "list":
        window.i13nData = {
          i13nPage: { impressions: products },
        };
        break;
      case "Clickproduct":
        g.dispatch("action", {
          I13N: {
            action: "ClickProduct",
            products: products,
          },
        });
        break;
      case "Product-Detail":
        g.dispatch("action", {
          I13N: {
            action: "ViewContent",
            detailProducts: products,
          },
        });
        break;
      case "Addtocart":
        g.dispatch("action", {
          I13N: {
            action: "Addtocart",
            products: products,
          },
        });
        break;
      case "Removefromcart":
        g.dispatch("action", {
          I13N: {
            action: "RemoveFromCart",
            products: products,
          },
        });
        break;
      case "Checkout":
        g.dispatch("action", {
          I13N: {
            action: "Checkout",
            stepOption: get(message, ["Paytype"]),
            products: products,
          },
        });
        break;
      case "Purchase":
        g.dispatch("action", {
          I13N: {
            action: "Purchase",
            purchaseId: get(message, ["TransactionID"]),
            affiliation: get(message, ["Affiliation"]),
            revenue: get(message, ["Amount"]),
            tax: get(message, ["Tax"]),
            shipping: get(message, ["Shipping"]),
            coupon: get(message, ["Coupon"]),
            products: products,
          },
        });
        break;
      case "Refunds":
        g.dispatch("action", {
          I13N: {
            action: "Refund",
            refundId: get(message, ["TransactionID"]),
            products: products,
          },
        });
        break;
      case "CompleteRegistration":
        g.dispatch("action", { I13N: { action: "CompleteRegistration" } });
        break;
      case "Search":
        g.dispatch({
          i13nPage: {
            impressions: products,
          },
        });
        g.dispatch("action", {
          I13N: {
            action: "Search",
            label: { search_string: get(message, ["Search"]) },
          },
        });
        break;
    }
  }
};

var _listener = function (model, message) {
  proccessI13nBeacon(model, message);
};

try {
  window.dataLayer = window.dataLayer || [];
  var helper = new DataLayerHelper(window.dataLayer, {
    listener: _listener,
    listenToPast: true,
  });
} catch (err) {
  console.warn("DataLayerHelper Instance Failed", err);
}
</script>
