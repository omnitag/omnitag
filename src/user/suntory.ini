script_hpAdHover="
<script>
  var g = window.i13n;
  var query = g.query;
  var getSelected = function () {
    var adSelected;
    var ads = query.all('.ad #panes div');
    ads.some(function(ad, key){
      if ('block' === ad.style.display) {
        adSelected = key;
        return true;
      } else {
        return false;
      }
    });
    return adSelected;
  };
  var getTabIndex = function(el) {
    var hoverIndex;
    var tabs = query.all('.ad #tab_nav a');
    tabs.some(function(tab, key){
      if (tab.isSameNode(el)) {
       hoverIndex = key;
       return true;
      } else {
        return false;
      }
    });
    return hoverIndex;
  };
  g.dispatch('config/set', { 
    getSelected: getSelected,
    getTabIndex: getTabIndex,
    adSelected: getSelected()
  });
</script>
"

script_hpAdClick="
<script>
  var g = window.i13n;
  g.dispatch('action', { 
    I13N: {
      action: 'unnecessaryClick',
    },
    i13nCb: function(e, I13N, p, state) {
      var t = e.currentTarget;
      var selected = state.get('adSelected');
      var getTabIndex = state.get('getTabIndex');
      var tabIndex = getTabIndex(t);
      if (selected === tabIndex) {
        I13N.label = {
          selected: selected,
          click: tabIndex
        };
        return I13N;
      } else {
        return null;
      }
    }
  });
</script>
"

script_addToCart="
<script>
  var g = window.i13n;
  var query = g.query;
  var getNum = g.getNum;
  g.dispatch('action', { 
    wait: 0,
    I13N: {
      action: 'AddToCart',
      category: 'Ecommerce',
    },
    i13nCb: function(e, I13N, p, state) {
      const pInfo = state.get('detailInfo').toJS();
      var t = e.currentTarget;
      var p = query.ancestor(t, 'tr');
      var priceNode = p.querySelector('td:nth-child(2)');
      var price = getNum(priceNode.innerText);
      var variantNeode = p.querySelector('td:nth-child(1)');
      var variant = variantNeode.innerText;

      pInfo.variant = variant;
      pInfo.price = price;
      I13N.ecommerceAddToCart = [pInfo];
      return I13N;
    }
  });
</script>
"

