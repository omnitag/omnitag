script_viewContent="
<script>
var g = window.i13n;
g.dispatch('action', {
  I13N: {
    type: 'cv',
    action: 'ViewContent',
  },
  i13nCb: function(e, I13N, params) {
    I13N.label = {pageName: params[0]};
    return I13N;
  },
  i13nPageCb: function(action, I13N, params){
    return {p: params[0]};
  }
})
</script>
"

