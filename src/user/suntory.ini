script_initUserId="
<script>
var g = window.i13n;
var getElValue = g.getElValue;
var query = g.query;
var isMobile = g.isMobile();
var base;
if (!isMobile) {
  var iframe = query.one('iframe[src*="/member/login"]'); 
  if (iframe && iframe.contentWindow) {
    base = iframe.contentWindow.document;
  }
}
var u = getElValue('#gtmServiceID', base);
if (u) {
  g.dispatch({ uid: u });
}
</script>
"

