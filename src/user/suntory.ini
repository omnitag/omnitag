script_addToCart="
<script>
  var g = window.i13n;
  var query = g.query;
  var getNum = g.getNum;
  g.dispatch('action', { 
    stop: true,
    I13N: {
      type: 'cv',
      action: 'AddToCart',
      category: 'Ecommerce',
    },
    i13nCb: function(e, I13N, p, state) {
      var t = e.currentTarget;
      var p = query.ancestor(t, 'tr');
      var priceNode = p.querySelector('td:nth-child(2)');
      var price = getNum(priceNode.innerText);
      var product = {
        price: price
      };
      I13N.ecommerceAddToCart = [product];
      return I13N;
    }
  });
</script>
"

