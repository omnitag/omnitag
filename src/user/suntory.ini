script_addMember="
<script>
var g = window.i13n;
var q = g.query;
var getOptionText = g.getOptionText;
var birthdayYear = q.one('select[name=regYear]').value;
var dCitySel = q.one('select[name=city2]');
var city = getOptionText(dCitySel);
var gender = q.one('input[name=sex1]:checked').value;
g.dispatch('action', {
  wait: 0,
  I13N: {
    action: 'CompleteRegistration',
    label: { 
      birthdayYear: birthdayYear,
      city: city,
      regType: 'site member',
      gender: (('M'===gender) ? 'male' : 'female'),
    }
  }
});
</script>
"

script_purchase="
<script>
var g = window.i13n;
var q = g.query;
var getNum = g.getNum;
var getUrl = g.getUrl;
var text = g.text;
var queryFrom = g.queryFrom;

var getProdId = function(el) {
  var id = null;
  var dLink = el.querySelector('a[href*="goods_id"]');
  if (dLink) {
    id = getUrl('goods_id', dLink.href);
  }
  return id;
};

var getProdItem = function(tr) {
  var tds = queryFrom(tr).all('td');
  var promoteIndex = (tds.length > 5) ? 5 : 4;
  var name = text(tds[0]);
  var price = getNum(tds[1]);
  var id = getProdId(tr); 
  var quantity = getNum(tds[2]);
  var promote = text(tds[promoteIndex]); 
  return {
    name: name,
    promote: promote,
    price: price,
    id: id,
    quantity: quantity
  };
};

var getProducts = function() {
  var arrTr = q.all('.carlist tbody tr');
  var products = arrTr.map(function(tr){
    return getProdItem(tr); 
  });
  return products;
};

var city = '';
var revenue = 0;
var dCity = q.all('.order'); 
if (dCity && dCity.length) {
  dCity = dCity[1].querySelector('table tr:nth-child(3) td');
  city = dCity.innerText.split(/\s/)[1];
}
var dRevenue = q.one('.steptotal2 .money .red');
if (dRevenue) {
  revenue = getNum(dRevenue.innerText);
}

g.dispatch('action', {
  wait: 99,
  stop: true,
  lazyKey: 'Purchase',
  withLazy: 'Purchase',
  I13N: {
    purchaseId: (new Date()).getTime(),
    action: 'Purchase',
    city: city,
    revenue: revenue,
    products: getProducts(),
  }
});
</script>
"

