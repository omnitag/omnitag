script_clickMenu="
<script>
  var g = window.i13n;
  var query = g.query;
  g.dispatch('action', {
    stop: true,
    I13N: {
      type: 'event',
      action: 'clickMenu'
    },
    i13nCb: function(e, I13N) {
      var t = e.target;
      var layers = [];
      var p = query.ancestor(t, 'li');
      if (p) {
        var t1 = query.one('h5');
        layers.push(t1.innerText);
      }
      layers.push(t.innerText);
      I13N.label = {layers: layers};
      return I13N;
    }
  });
</script>
"

