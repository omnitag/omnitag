script_clickMenu="
<script>
  var g = window.i13n;
  var query = g.query;
  var text = g.text;
  g.dispatch('action', {
    wait: 0,
    I13N: {
      action: 'ClickMenu'
    },
    i13nCb: function(e, I13N) {
      if (!e) {
        return;
      }
      var t = e.target;
      var layers = [];
      var p = query.ancestor(t, 'li');
      if (p) {
        var t1 = text(query.one('h5'));
        if (t1) {
          layers.push(t1);
        }
      }
      layers.push(text(t));
      I13N.label = {layers: layers};
      return I13N;
    }
  });
</script>
"

